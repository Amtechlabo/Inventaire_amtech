<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap');

  --bg:#0f1117;--bg2:#1a1d27;--bg3:#242736;--border:#2e3245;

.location-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem;cursor:pointer;transition:all .2s;position:relative}

@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:200;animation:fadeIn .2s;border-left:3px solid var(--accent)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Login screen */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1rem}

<div class="app" id="root">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, collection, setDoc, deleteDoc,
  onSnapshot, getDoc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Helpers ──────────────────────────────────────────────────────────────────
function uid(){ return Math.random().toString(36).slice(2,9) }

function toast(msg, dur=2500){
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), dur);
}

const icons={armoire:'🗄️',étagère:'📚',frigo:'❄️',congélateur:'🧊',tiroir:'🗃️',paillasse:'🔬',autre:'📦'};

// ── Config check ──────────────────────────────────────────────────────────────
const isConfigured = FIREBASE_CONFIG.apiKey !== "COLLE_ICI";

// ── State ─────────────────────────────────────────────────────────────────────
let db_fs = null;
let locations = [];   // [{id, name, icon, type, items:[...]}]
let unsubscribers = [];
let currentView = 'locations';
let selectedLoc = null;
let authed = false;

// ── Firebase init ─────────────────────────────────────────────────────────────
function initFirebase(){
  const app = initializeApp(FIREBASE_CONFIG);
  db_fs = getFirestore(app);
  startSync();
}

// ── Real-time sync ────────────────────────────────────────────────────────────
function startSync(){
  setSyncStatus('loading');
  const locCol = collection(db_fs, 'locations');
  const unsub = onSnapshot(locCol, snap => {
    const newLocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    newLocs.sort((a,b)=>(a.order||0)-(b.order||0)||(a.name||'').localeCompare(b.name||''));
    locations = newLocs;
    setSyncStatus('ok');
    render();
  }, err => {
    console.error(err);
    setSyncStatus('error');
  });
  unsubscribers.push(unsub);
}

function setSyncStatus(s){
  const dot = document.getElementById('sync-dot');
  if(!dot) return;
  dot.className = 'sync-dot ' + s;
  dot.title = s==='ok'?'Synchronisé':s==='error'?'Erreur de connexion':'Connexion...';
}

// ── Firestore writes ──────────────────────────────────────────────────────────
async function saveLoc(loc){
  await setDoc(doc(db_fs, 'locations', loc.id), loc);
}
async function deleteLoc(id){
  await deleteDoc(doc(db_fs, 'locations', id));
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function checkPassword(){
  const val = document.getElementById('pwd-input').value;
  if(val === APP_PASSWORD){
    authed = true;
    sessionStorage.setItem('labo_auth','1');
    render();
  } else {
    document.getElementById('pwd-error').textContent = 'Mot de passe incorrect';
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function showView(v){
  currentView=v;
  document.querySelectorAll('.views .btn').forEach(b=>{
    const map={locations:'empl',search:'rech',qrlist:'qr'};
    b.classList.toggle('active', b.dataset.view===v);
  });
  render();
}

function render(){
  const root = document.getElementById('root');
  if(!isConfigured){ root.innerHTML = renderConfig(); return; }
  if(!authed){ root.innerHTML = renderLogin(); return; }
  root.innerHTML = `
    <div class="header">
      <div class="logo">stock<span>.</span>elec <span class="sync-dot" id="sync-dot"></span></div>
      <div class="views">
        <button class="btn ${currentView==='locations'?'active':''}" data-view="locations" onclick="showView('locations')">📦 Emplacements</button>
        <button class="btn ${currentView==='search'?'active':''}" data-view="search" onclick="showView('search')">🔍 Recherche</button>
        <button class="btn ${currentView==='qrlist'?'active':''}" data-view="qrlist" onclick="showView('qrlist')">📷 QR Codes</button>
      </div>
    </div>
    <div id="view-content">${renderView()}</div>
  `;
  setSyncStatus(locations.length>0?'ok':'loading');
}

function renderView(){
  if(currentView==='locations') return renderLocations();
  if(currentView==='items') return renderItems();
  if(currentView==='search') return renderSearch();
  if(currentView==='qrlist') return renderQRList();
  return '';
}

// ── Login ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  return `
  <div class="login-screen">
    <div class="login-box">
      <span class="logo">⚡ stock.elec</span>
      <p style="color:var(--muted);font-size:13px;margin-bottom:1.5rem">Accès protégé</p>
      <input id="pwd-input" type="password" placeholder="Mot de passe" style="margin-bottom:10px" onkeydown="if(event.key==='Enter')checkPassword()">
      <div id="pwd-error" style="color:var(--danger);font-size:12px;min-height:18px;margin-bottom:10px"></div>
      <button class="btn btn-primary" style="width:100%" onclick="checkPassword()">Accéder →</button>
    </div>
  </div>`;
}

// ── Config guide ──────────────────────────────────────────────────────────────
function renderConfig(){
  return `
  <div class="config-screen">
    <div style="margin-bottom:2rem">
      <div class="logo" style="font-size:24px;margin-bottom:0.5rem">stock<span>.</span>elec</div>
      <p style="color:var(--muted)">Configuration Firebase requise</p>
    </div>
    <div class="panel">
      <div class="panel-title" style="margin-bottom:1.25rem">⚙️ Configuration en 5 minutes</div>
      <div class="step"><div class="step-num">1</div><div class="step-text">Va sur <b><a href="https://console.firebase.google.com" target="_blank" style="color:var(--accent2)">console.firebase.google.com</a></b> et connecte-toi avec ton compte Google.</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-text">Clique <b>Ajouter un projet</b> → nomme-le <b>labo-stock</b> → Créer.</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-text">Dans le projet, clique l'icône <b>&lt;/&gt;</b> (Web) → enregistre l'app → copie le bloc <code>firebaseConfig</code>.</div></div>
      <div class="step"><div class="step-num">4</div><div class="step-text">Menu gauche → <b>Build → Firestore Database</b> → Créer une base → choisir <b>Mode test</b> → Activer.</div></div>
      <div class="step"><div class="step-num">5</div><div class="step-text">Ouvre ce fichier HTML dans un éditeur de texte et remplace les <b>COLLE_ICI</b> dans <code>FIREBASE_CONFIG</code> par tes vraies valeurs.</div></div>
      <pre>const FIREBASE_CONFIG = {
  apiKey:            "AIzaSy...",
  authDomain:        "labo-stock.firebaseapp.com",
  projectId:         "labo-stock",
  storageBucket:     "labo-stock.appspot.com",
  messagingSenderId: "123456789",
  appId:             "1:123456:web:abcdef"
};</pre>
      <div class="step"><div class="step-num">6</div><div class="step-text">Change aussi <b>APP_PASSWORD</b> pour ton mot de passe perso, puis ouvre le fichier dans le navigateur. C'est tout !</div></div>
    </div>
  </div>`;
}

// ── Locations view ────────────────────────────────────────────────────────────
function renderLocations(){
  const totalRefs = locations.reduce((s,l)=>s+(l.items||[]).length,0);
  const totalQty  = locations.reduce((s,l)=>s+(l.items||[]).reduce((ss,i)=>ss+(i.qty||0),0),0);
  const lowCount  = locations.reduce((s,l)=>s+(l.items||[]).filter(i=>i.minQty&&i.qty<=i.minQty).length,0);
  return `
  <div class="stats-bar">
    <div class="stat"><div class="stat-val">${locations.length}</div><div class="stat-label">Emplacements</div></div>
    <div class="stat"><div class="stat-val">${totalRefs}</div><div class="stat-label">Références</div></div>
    <div class="stat"><div class="stat-val">${totalQty}</div><div class="stat-label">Articles total</div></div>
    <div class="stat"><div class="stat-val" style="color:${lowCount>0?'var(--danger)':'var(--accent)'}">${lowCount}</div><div class="stat-label">Stock bas</div></div>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
    <button class="btn btn-primary" onclick="openAddLocation()">+ Ajouter emplacement</button>
  </div>
  <div class="grid">
    ${locations.map(l=>`
    <div class="location-card" onclick="openLocation('${l.id}')">
      <div class="loc-icon">${l.icon}</div>
      <div class="loc-name">${l.name}</div>
      <div class="loc-count">${(l.items||[]).length} référence(s)</div>
      <span class="tag">${l.type}</span>
      <div class="loc-actions" onclick="event.stopPropagation()">
        <button class="btn" style="flex:1;font-size:12px;padding:5px 8px" onclick="openQR('${l.id}')">QR Code</button>
        <button class="btn btn-danger" style="font-size:12px;padding:5px 8px" onclick="confirmDeleteLoc('${l.id}')">✕</button>
      </div>
    </div>`).join('')}
  </div>
  ${locations.length===0?'<div class="empty"><div class="big">📦</div><div>Aucun emplacement.<br>Créez votre premier stockage !</div></div>':''}`;
}

// ── Items view ────────────────────────────────────────────────────────────────
function openLocation(id){ selectedLoc=id; currentView='items'; render(); }

function renderItems(){
  const loc = locations.find(l=>l.id===selectedLoc);
  if(!loc){ currentView='locations'; return renderLocations(); }
  const items = loc.items||[];
  const low = items.filter(i=>i.minQty&&i.qty<=i.minQty);
  return `
  <div class="breadcrumb">
    <a onclick="currentView='locations';render()">← Emplacements</a> / <span>${loc.name}</span>
  </div>
  ${low.length?`<div style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:1rem">⚠️ Stock bas : ${low.map(i=>i.name).join(', ')}</div>`:''}
  <div class="panel">
    <div class="panel-header">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:24px">${loc.icon}</span>
        <span class="panel-title">${loc.name}</span>
        <span class="tag">${loc.type}</span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="openQR('${loc.id}')">QR</button>
        <button class="btn btn-primary" onclick="openAddItem('${loc.id}')">+ Article</button>
      </div>
    </div>
    ${items.length===0?'<div class="empty" style="padding:2rem"><div class="big">🔍</div><div>Vide pour l\'instant</div></div>':''}
    ${items.map(item=>`
    <div class="item-row">
      <div style="flex:1;min-width:0">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${item.ref||'—'} · ${item.unit||'pcs'}</div>
      </div>
      ${item.minQty&&item.qty<=item.minQty?`<span class="badge badge-low">bas</span>`:''}
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${loc.id}','${item.id}',-1)">−</button>
        <span class="item-qty">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${loc.id}','${item.id}',1)">+</button>
      </div>
      <button class="btn btn-danger" style="font-size:11px;padding:4px 8px" onclick="confirmDeleteItem('${loc.id}','${item.id}')">✕</button>
    </div>`).join('')}
  </div>`;
}

// ── Search view ───────────────────────────────────────────────────────────────
function renderSearch(){
  return `
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input id="search-input" placeholder="Chercher un article dans tout l'inventaire..." oninput="doSearch()" autofocus>
  </div>
  <div id="search-results" class="panel" style="min-height:120px">
    <div class="empty" style="padding:1.5rem"><div>Tapez pour chercher</div></div>
  </div>`;
}

function doSearch(){
  const q = document.getElementById('search-input')?.value.toLowerCase().trim();
  const el = document.getElementById('search-results');
  if(!el) return;
  if(!q){ el.innerHTML='<div class="empty" style="padding:1.5rem"><div>Tapez pour chercher</div></div>'; return; }
  const results=[];
  locations.forEach(loc=>(loc.items||[]).forEach(item=>{
    if(item.name.toLowerCase().includes(q)||(item.ref||'').toLowerCase().includes(q))
      results.push({loc,item});
  }));
  if(!results.length){ el.innerHTML=`<div class="empty" style="padding:1.5rem"><div>Aucun résultat pour <b>${q}</b></div></div>`; return; }
  el.innerHTML=results.map(({loc,item})=>`
  <div class="item-row">
    <div style="flex:1;min-width:0">
      <div class="item-name">${item.name}</div>
      <div class="item-meta"><span style="color:var(--accent2)">${loc.icon} ${loc.name}</span> · ${item.ref||'—'} · ${item.unit||'pcs'}</div>
    </div>
    ${item.minQty&&item.qty<=item.minQty?`<span class="badge badge-low">bas</span>`:''}
    <div class="qty-ctrl">
      <button class="qty-btn" onclick="changeQty('${loc.id}','${item.id}',-1)">−</button>
      <span class="item-qty">${item.qty}</span>
      <button class="qty-btn" onclick="changeQty('${loc.id}','${item.id}',1)">+</button>
    </div>
  </div>`).join('');
}

// ── QR list ───────────────────────────────────────────────────────────────────
function renderQRList(){
  return `
  <div class="panel">
    <div class="panel-header"><div class="panel-title">📷 QR Codes par emplacement</div></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Cliquez sur un emplacement pour générer, afficher et imprimer son QR code.</p>
    ${locations.map(loc=>`
    <div class="item-row" style="cursor:pointer" onclick="openQR('${loc.id}')">
      <span style="font-size:20px">${loc.icon}</span>
      <div style="flex:1;margin-left:8px">
        <div class="item-name">${loc.name}</div>
        <div class="item-meta">${(loc.items||[]).length} article(s)</div>
      </div>
      <span class="tag">Voir QR →</span>
    </div>`).join('')}
    ${locations.length===0?'<div class="empty" style="padding:1.5rem"><div>Aucun emplacement créé</div></div>':''}
  </div>`;
}

// ── QR Code modal ─────────────────────────────────────────────────────────────
function openQR(locId){
  const loc = locations.find(l=>l.id===locId);
  const url = window.location.href.split('?')[0] + '?loc=' + locId;
  const m = document.createElement('div');
  m.className = 'modal-backdrop';
  m.innerHTML = `
  <div class="modal" onclick="event.stopPropagation()" style="text-align:center">
    <div class="modal-title">${loc.icon} ${loc.name}</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:.5rem">Scanner pour voir l'inventaire de cet emplacement.</p>
    <div class="qr-container"><div id="qr-canvas"></div></div>
    <div class="url-display">${url}</div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn" style="flex:1" onclick="this.closest('.modal-backdrop').remove()">Fermer</button>
      <button class="btn btn-primary" style="flex:1" onclick="printQR('${locId}')">🖨️ Imprimer</button>
    </div>
  </div>`;
  m.onclick = ()=>m.remove();
  document.body.appendChild(m);
  import("https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js").catch(()=>{});
  setTimeout(()=>{
    if(typeof QRCode !== 'undefined'){
      new QRCode(document.getElementById('qr-canvas'),{text:url,width:200,height:200,colorDark:'#000000',colorLight:'#ffffff'});
    } else {
      // fallback via API
      document.getElementById('qr-canvas').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}" style="border-radius:4px">`;
    }
  }, 100);
}

function printQR(locId){
  const loc = locations.find(l=>l.id===locId);
  const url = window.location.href.split('?')[0] + '?loc=' + locId;
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>QR - ${loc.name}</title>
<style>
  body{font-family:'Segoe UI',sans-serif;text-align:center;padding:2rem;background:#fff;display:flex;flex-direction:column;align-items:center}
  .box{border:2px solid #111;padding:1.5rem 2rem;border-radius:12px;display:inline-block;margin-top:1rem}
  h2{font-size:22px;margin:0 0 4px}p{color:#666;font-size:13px;margin-bottom:1rem}
  .url{font-family:monospace;font-size:10px;color:#999;margin-top:12px;max-width:220px;word-break:break-all}
</style></head><body>
<div class="box">
  <h2>${loc.icon} ${loc.name}</h2>
  <p>Scanner pour voir l'inventaire</p>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}&margin=8" style="border-radius:4px">
  <div class="url">${url}</div>
</div>
<script>window.onload=()=>setTimeout(()=>window.print(),600)<\/script>
</body></html>`);
  w.document.close();
}

// ── Add location modal ────────────────────────────────────────────────────────
function openAddLocation(){
  const m = document.createElement('div');
  m.className = 'modal-backdrop';
  m.innerHTML = `
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Nouvel emplacement</div>
    <div class="form-col" style="margin-bottom:10px"><label>Nom *</label><input id="ml-name" placeholder="ex: Armoire C, Frigo 2..."></div>
    <div class="form-col" style="margin-bottom:10px"><label>Type</label>
      <select id="ml-type">${Object.keys(icons).map(k=>`<option value="${k}">${icons[k]} ${k.charAt(0).toUpperCase()+k.slice(1)}</option>`).join('')}</select>
    </div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn" style="flex:1" onclick="this.closest('.modal-backdrop').remove()">Annuler</button>
      <button class="btn btn-primary" style="flex:1" onclick="addLocation()">Créer</button>
    </div>
  </div>`;
  m.onclick = ()=>m.remove();
  document.body.appendChild(m);
  document.getElementById('ml-name').focus();
}

async function addLocation(){
  const name = document.getElementById('ml-name').value.trim();
  const type = document.getElementById('ml-type').value;
  if(!name) return;
  const loc = {id:uid(), name, icon:icons[type], type, items:[], order:Date.now()};
  document.querySelector('.modal-backdrop')?.remove();
  await saveLoc(loc);
  toast('✅ Emplacement créé');
}

// ── Add item modal ────────────────────────────────────────────────────────────
function openAddItem(locId){
  const m = document.createElement('div');
  m.className = 'modal-backdrop';
  m.innerHTML = `
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Ajouter un article</div>
    <div class="form-col" style="margin-bottom:10px"><label>Nom *</label><input id="ai-name" placeholder="ex: Gants nitrile taille L"></div>
    <div class="form-row">
      <div class="form-col"><label>Référence</label><input id="ai-ref" placeholder="GLV-L"></div>
      <div class="form-col"><label>Unité</label><input id="ai-unit" placeholder="boîte, pcs, ml..." value="pcs"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Quantité</label><input id="ai-qty" type="number" value="1" min="0"></div>
      <div class="form-col"><label>Seuil alerte</label><input id="ai-min" type="number" placeholder="0" min="0"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn" style="flex:1" onclick="this.closest('.modal-backdrop').remove()">Annuler</button>
      <button class="btn btn-primary" style="flex:1" onclick="addItem('${locId}')">Ajouter</button>
    </div>
  </div>`;
  m.onclick = ()=>m.remove();
  document.body.appendChild(m);
  document.getElementById('ai-name').focus();
}

async function addItem(locId){
  const name = document.getElementById('ai-name').value.trim();
  if(!name) return;
  const loc = locations.find(l=>l.id===locId);
  const items = [...(loc.items||[])];
  const existing = items.find(i=>i.name.toLowerCase()===name.toLowerCase());
  if(existing){
    existing.qty += parseInt(document.getElementById('ai-qty').value)||0;
  } else {
    items.push({
      id:uid(), name,
      ref:document.getElementById('ai-ref').value.trim(),
      unit:document.getElementById('ai-unit').value.trim()||'pcs',
      qty:parseInt(document.getElementById('ai-qty').value)||0,
      minQty:parseInt(document.getElementById('ai-min').value)||0,
    });
  }
  document.querySelector('.modal-backdrop')?.remove();
  await saveLoc({...loc, items});
  toast('✅ Article ajouté');
}

// ── Quantity update ───────────────────────────────────────────────────────────
async function changeQty(locId, itemId, delta){
  const loc = locations.find(l=>l.id===locId);
  const items = (loc.items||[]).map(i=>i.id===itemId?{...i,qty:Math.max(0,i.qty+delta)}:i);
  await saveLoc({...loc, items});
}

// ── Delete helpers ────────────────────────────────────────────────────────────
function confirmDeleteLoc(id){
  const loc = locations.find(l=>l.id===id);
  if(!confirm(`Supprimer "${loc.name}" et ses ${(loc.items||[]).length} articles ?`)) return;
  deleteLoc(id).then(()=>toast('🗑️ Supprimé'));
}

function confirmDeleteItem(locId, itemId){
  const loc = locations.find(l=>l.id===locId);
  const item = (loc.items||[]).find(i=>i.id===itemId);
  if(!confirm(`Supprimer "${item.name}" ?`)) return;
  const items = (loc.items||[]).filter(i=>i.id!==itemId);
  saveLoc({...loc,items}).then(()=>toast('🗑️ Article supprimé'));
}

// ── QR param on load ──────────────────────────────────────────────────────────
function checkQRParam(){
  const locId = new URLSearchParams(window.location.search).get('loc');
  if(locId){
    selectedLoc = locId;
    currentView = 'items';
  }
}

// ── Expose to global ──────────────────────────────────────────────────────────
Object.assign(window, {
  showView, checkPassword, openLocation, openAddLocation, addLocation,
  openAddItem, addItem, changeQty, confirmDeleteLoc, confirmDeleteItem,
  openQR, printQR, doSearch
});

// ── Boot ──────────────────────────────────────────────────────────────────────
authed = APP_PASSWORD === null || sessionStorage.getItem('labo_auth')==='1';
checkQRParam();
if(isConfigured){ initFirebase(); } else { render(); }
</script>
